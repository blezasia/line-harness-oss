name = "blez-line-bot"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

# Static assets (LIFF pages) served by Workers Assets
# SPA fallback ensures all non-API paths serve index.html
[assets]
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "f439dd1d-41be-49e9-ba02-8cb5483a7c7f"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[triggers]
crons = [ "0 * * * *" ]
